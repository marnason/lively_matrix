name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          BASE=$(jq -r '.AppVersion' source/LivelyInfo.json | cut -d. -f1-3)
          echo "tag=v$BASE.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: zip -r matrix-wallpaper-v2.zip source/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: matrix-wallpaper-v2.zip
